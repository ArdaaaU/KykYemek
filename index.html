            margin: 0;
            color: var(--text-main);

        }

        header {
            padding: 40px 20px 20px;

            background: var(--glass-bg);

            border-bottom: 1px solid var(--glass-border);

            gap: 10px;

        }

        .tab-btn {
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px 80px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }

        .day-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            min-height: 100px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .day-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: var(--accent); }

        .empty-slot { background: rgba(0, 0, 0, 0.02); border: 1px dashed #cbd5e1; cursor: default; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 9999;
            align-items: center; justify-content: center; padding: 15px; box-sizing: border-box;
        }

        .modal-content {
            background: white; width: 100%; max-width: 450px; border-radius: 25px;
            padding: 30px; position: relative; animation: slideUp 0.3s ease-out;
            max-height: 90vh; overflow-y: auto;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-modal { position: absolute; top: 15px; right: 15px; background: #f1f5f9; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .modal-header h3 { font-size: 2rem; margin: 0; color: var(--primary); }
        .modal-header p { color: var(--text-muted); margin: 5px 0 25px; font-weight: 600; }

        .detail-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; }
        .detail-item:last-of-type { border-bottom: none; }
        
        .icon-circle { width: 44px; height: 44px; background: #f8fafc; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.2rem; }

</head>

        for(let i=0; i<4; i++) {
            const div = document.createElement('div');
            div.className = 'day-card empty-slot';
            calendar.appendChild(div);
        }

        // Mayıs ayı 31 gün
        for(let day=1; day<=31; day++) {
            const data = dataSet[day];
            const card = document.createElement('div');
            card.className = `day-card ${day === today ? 'is-today' : ''}`;
            card.innerHTML = `
                ${day === today ? '<div class="today-tag">BUGÜN</div>' : ''}
                <div class="day-number">${day}</div>
                <div class="main-item-preview">${data.a}</div>
            `;
            card.onclick = () => openModal(day, mode);
            calendar.appendChild(card);
        }
    }

    function openModal(day, mode) {
        const d = mode === 'dinner' ? dinnerData[day] : breakfastData[day];

        document.getElementById('m-date').innerText = day < 10 ? '0' + day : day;
        document.getElementById('m-day').innerText = d.d + " Mayıs 2026";

        const details = document.getElementById('modal-details');
        details.innerHTML = mode === 'dinner' ? `
            <div class="detail-item"><div class="icon-circle">🥣</div><div class="detail-text"><label>Çorba</label><span>${d.c}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🍖</div><div class="detail-text"><label>Ana Yemek</label><span>${d.a}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🥗</div><div class="detail-text"><label>Alternatif</label><span>${d.s}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🍚</div><div class="detail-text"><label>Yardımcı</label><span>${d.y}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🍎</div><div class="detail-text"><label>Ek</label><span>${d.e}</span></div></div>
        ` : `
            <div class="detail-item"><div class="icon-circle">🍳</div><div class="detail-text"><label>Sıcak Kahvaltı</label><span>${d.a}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🥐</div><div class="detail-text"><label>Hamur İşi / Yan</label><span>${d.s}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🧀</div><div class="detail-text"><label>Peynir</label><span>${d.y}</span></div></div>
            <div class="detail-item"><div class="icon-circle">☕</div><div class="detail-text"><label>Ekstra / İçecek</label><span>${d.e}</span></div></div>
        `;

        document.getElementById('m-kcal').innerText = `⚡ Ortalama ${d.k} kkal`;
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Scrollu engelle
    }

    function switchMenu(mode, event) {
        currentMode = mode;
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        document.documentElement.style.setProperty('--accent', mode === 'dinner' ? 'var(--accent-dinner)' : '#2563eb');
        build(mode);
    }

    function closeModal() { 
        document.getElementById('overlay').style.display = 'none'; 
        document.body.style.overflow = 'auto'; // Scrollu aç
    }

    window.onclick = (e) => { if(e.target == document.getElementById('overlay')) closeModal(); }
    
    build('dinner');
</script>

</body>
</html>
