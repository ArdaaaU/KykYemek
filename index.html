            --accent-dinner: #dc2626; /* Kırmızı - Akşam için */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --today-glow: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            background-attachment: fixed;
            margin: 0;
            color: var(--text-main);

        header {
            padding: 40px 20px 20px;

        header h2 { margin: 10px 0; font-size: 2rem; font-weight: 800; color: var(--primary); }

        /* Menü Seçici Sekmeler */
        .menu-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .tab-btn {
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px 80px; }

        .calendar-nav { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; margin-bottom: 20px; text-align: center; }
        .calendar-nav div { font-weight: 700; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }

        .day-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            min-height: 120px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .day-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -10px rgba(0, 0, 0, 0.1); border-color: var(--accent); }
        
        .day-number { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
        .main-item-preview { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .is-today { background: #fffbeb !important; border: 2px solid var(--today-glow) !important; }
        .today-tag { position: absolute; top: 12px; right: 12px; font-size: 0.6rem; background: var(--today-glow); color: white; padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        .empty-slot { background: rgba(0, 0, 0, 0.03); border: 1px dashed #cbd5e1; cursor: default; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); z-index: 9999;
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: white; width: 90%; max-width: 500px; border-radius: 30px;
            padding: 35px; position: relative; animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .close-modal { position: absolute; top: 20px; right: 20px; background: #f1f5f9; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        .modal-header h3 { font-size: 2.2rem; margin: 0; color: var(--primary); }
        .modal-header p { color: var(--text-muted); margin: 5px 0 25px; }

        .detail-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 18px; }
        .icon-circle { width: 40px; height: 40px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .detail-text label { display: block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }

        @media (max-width: 768px) {

            .main-item-preview { display: none; }

    </style>
</head>

    function build(mode) {
        const calendar = document.getElementById('calendar');
        calendar.innerHTML = '';
        const dataSet = mode === 'dinner' ? dinnerData : breakfastData;

        // 1 Mart Pazar olduğu için Pazartesi başlangıçlı takvimde 6 boşluk.
        for(let i=0; i<6; i++) {
            const div = document.createElement('div');
            div.className = 'day-card empty-slot';
            calendar.appendChild(div);
        }

        for(let day=1; day<=31; day++) {
            const data = dataSet[day];
            const card = document.createElement('div');
            card.className = `day-card ${day === today ? 'is-today' : ''}`;
            card.innerHTML = `
                ${day === today ? '<div class="today-tag">BUGÜN</div>' : ''}
                <div class="day-number">${day}</div>
                <div class="main-item-preview">${data.a}</div>
            `;
            card.onclick = () => openModal(day, mode);
            calendar.appendChild(card);
        }
    }

    function openModal(day, mode) {
        const d = mode === 'dinner' ? dinnerData[day] : breakfastData[day];
        const isRamazan = day >= 23;

        document.getElementById('m-date').innerText = day < 10 ? '0' + day : day;
        document.getElementById('m-day').innerText = d.d + " Mart 2026";
        document.getElementById('ramazan-note').style.display = isRamazan ? 'block' : 'none';

        const details = document.getElementById('modal-details');
        details.innerHTML = mode === 'dinner' ? `
            <div class="detail-item"><div class="icon-circle">🥣</div><div class="detail-text"><label>Çorba</label><span>${d.c}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🍖</div><div class="detail-text"><label>Ana Yemek</label><span>${d.a}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🥗</div><div class="detail-text"><label>Alternatif</label><span>${d.s}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🍚</div><div class="detail-text"><label>Yardımcı</label><span>${d.y}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🍎</div><div class="detail-text"><label>Ek</label><span>${d.e}</span></div></div>
        ` : `
            <div class="detail-item"><div class="icon-circle">🥣</div><div class="detail-text"><label>Çorba</label><span>${d.c}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🍳</div><div class="detail-text"><label>Sıcak Kahvaltı</label><span>${d.a}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🥐</div><div class="detail-text"><label>Hamur İşi / Yan</label><span>${d.s}</span></div></div>
            <div class="detail-item"><div class="icon-circle">🧀</div><div class="detail-text"><label>Peynir</label><span>${d.y}</span></div></div>
            <div class="detail-item"><div class="icon-circle">☕</div><div class="detail-text"><label>Ekstra / İçecek</label><span>${d.e}</span></div></div>
        `;

        document.getElementById('m-kcal').innerText = `⚡ Ortalama ${d.k} kkal`;
        document.getElementById('overlay').style.display = 'flex';
    }

    function switchMenu(mode) {
        currentMode = mode;
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.documentElement.style.setProperty('--accent', mode === 'dinner' ? 'var(--accent-dinner)' : '#2563eb');
        build(mode);
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('overlay')) closeModal(); }
    
    build('dinner');
</script>

</body>
</html>
